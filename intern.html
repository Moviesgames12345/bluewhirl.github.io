<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>The Interns Are Striking Back - Closed Alpha</title>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body, html {
			width: 100%;
			height: 100%;
			overflow: hidden;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
		}

		.video-background {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			object-fit: cover;
			z-index: -2;
		}

		.video-overlay {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.6);
			z-index: -1;
		}

		.content-wrapper {
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
			padding: 20px;
			text-align: center;
		}

		.headline {
			font-size: clamp(28px, 8vw, 56px);
			font-weight: 900;
			color: #ffffff;
			text-transform: uppercase;
			letter-spacing: 2px;
			line-height: 1.1;
			margin-bottom: 16px;
			text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.8);
		}

		.sub-headline {
			font-size: clamp(16px, 4vw, 22px);
			font-weight: 500;
			color: #e5e5e5;
			line-height: 1.4;
			margin-bottom: 32px;
			max-width: 600px;
			text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8);
		}

		.scarcity-text {
			font-size: clamp(14px, 3.5vw, 18px);
			font-weight: 700;
			color: #ff3333;
			margin-bottom: 24px;
			text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.9);
			animation: pulse 2s ease-in-out infinite;
		}

		@keyframes pulse {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.7; }
		}

		.form-container {
			width: 100%;
			max-width: 460px;
			display: flex;
			flex-direction: column;
			gap: 12px;
		}

		.email-input {
			width: 100%;
			padding: 18px 20px;
			font-size: 16px;
			border: 3px solid rgba(255, 255, 255, 0.3);
			border-radius: 8px;
			background: rgba(255, 255, 255, 0.95);
			color: #1a1a1a;
			font-weight: 500;
			transition: all 0.3s ease;
		}

		.email-input:focus {
			outline: none;
			border-color: #00ff88;
			box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
		}

		.email-input::placeholder {
			color: #666;
		}

		.submit-button {
			width: 100%;
			padding: 20px;
			font-size: clamp(16px, 4vw, 20px);
			font-weight: 900;
			text-transform: uppercase;
			color: #000000;
			background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
			border: none;
			border-radius: 8px;
			cursor: pointer;
			letter-spacing: 1px;
			transition: all 0.3s ease;
			box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4);
		}

		.submit-button:hover {
			transform: translateY(-2px);
			box-shadow: 0 8px 30px rgba(0, 255, 136, 0.6);
		}

		.submit-button:active {
			transform: translateY(0);
		}

		.submit-button:disabled {
			opacity: 0.6;
			cursor: not-allowed;
		}

		.error-message {
			color: #ff3333;
			font-size: 14px;
			font-weight: 600;
			margin-top: 8px;
			display: none;
			text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
		}

		.success-message {
			color: #00ff88;
			font-size: 18px;
			font-weight: 700;
			margin-top: 16px;
			display: none;
			text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
		}
	</style>
</head>
<body>
	<video class="video-background" autoplay muted loop playsinline>
		<source src="assets/test5.mp4" type="video/mp4">
	</video>
	<div class="video-overlay"></div>

	<div class="content-wrapper">
		<h1 class="headline">THE INTERNS ARE STRIKING BACK.</h1>
		<p class="sub-headline">You are a severely underpaid intern. Survive an endless horde of toxic managers and demonic HR reps.</p>
		<p class="scarcity-text">🔴 Closed Alpha limited to 500 players.</p>

		<form class="form-container" id="leadForm" onsubmit="return handleSubmit(event)">
			<input 
				type="email" 
				class="email-input" 
				id="emailInput" 
				placeholder="Enter your email" 
				required
				autocomplete="email"
			>
			<button type="submit" class="submit-button" id="submitBtn">CLAIM MY ALPHA KEY</button>
			<div class="error-message" id="errorMessage"></div>
			<div class="success-message" id="successMessage">✓ Alpha key claimed! Check your email.</div>
		</form>
	</div>

	<script>
		function trackLead(conceptName) {
			// Track lead conversion
			console.log('Lead tracked:', conceptName);

			// Add your tracking code here if needed in the future
			// Example: Google Analytics, Mixpanel, etc.
		}

		function handleSubmit(event) {
			event.preventDefault();

			const emailInput = document.getElementById('emailInput');
			const submitBtn = document.getElementById('submitBtn');
			const errorMessage = document.getElementById('errorMessage');
			const successMessage = document.getElementById('successMessage');
			const email = emailInput.value.trim();

			// Reset messages
			errorMessage.style.display = 'none';
			successMessage.style.display = 'none';

			// Basic email validation
			const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
			if (!emailRegex.test(email)) {
				errorMessage.textContent = 'Please enter a valid email address.';
				errorMessage.style.display = 'block';
				return false;
			}

			// Disable button during submission
			submitBtn.disabled = true;
			submitBtn.textContent = 'CLAIMING...';

			// Track the lead
			trackLead('Lead_Corporate');

			// Send to FormSpree email collection service
			fetch('https://formspree.io/f/mdkznydk', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
				},
				body: JSON.stringify({
					email: email,
					concept: 'Lead_Corporate',
					source: 'intern_squeeze_page',
					timestamp: new Date().toISOString()
				})
			})
			.then(response => {
				if (!response.ok) throw new Error('Network response was not ok');
				return response.json();
			})
			.then(data => {
				// Success
				successMessage.style.display = 'block';
				emailInput.value = '';

				// Optional: Redirect to thank you page after 2 seconds
				// setTimeout(() => { window.location.href = '/thank-you.html'; }, 2000);
			})
			.catch(error => {
				console.error('Error:', error);
				errorMessage.textContent = 'Something went wrong. Please try again.';
				errorMessage.style.display = 'block';
			})
			.finally(() => {
				submitBtn.disabled = false;
				submitBtn.textContent = 'CLAIM MY ALPHA KEY';
			});

			return false;
		}

		// Fallback for video loading on mobile
		window.addEventListener('load', () => {
			const video = document.querySelector('.video-background');
			if (video) {
				video.play().catch(err => {
					console.log('Video autoplay failed:', err);
				});
			}
		});
	</script>
</body>
</html>
