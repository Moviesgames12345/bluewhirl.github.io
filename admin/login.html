<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Blue Whirl</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.cursors-4u.net/cursors/animated/cur1-11-47e999d7-32.css">
    <style>
        body {
            background-color: #0f172a;
            color: #38bdf8;
            font-family: 'Courier New', Courier, monospace;
        }

        .login-card {
            background-color: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
        }

        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
            background: linear-gradient(rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.9)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        input {
            background: rgba(30, 41, 59, 0.5) !important;
            border: 1px solid rgba(56, 189, 248, 0.3) !important;
            color: #38bdf8 !important;
        }

        input:focus {
            border-color: #38bdf8 !important;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.3) !important;
            outline: none;
        }

        .btn-access {
            background: linear-gradient(45deg, #0ea5e9, #22d3ee);
            transition: all 0.3s ease;
        }

        .btn-access:hover {
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
            transform: translateY(-2px);
        }

        .terminal-header {
            background: rgba(56, 189, 248, 0.1);
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">
    <div class="matrix-bg"></div>

    <div class="login-card w-full max-w-md rounded-lg overflow-hidden border border-sky-500/30">
        <div class="terminal-header p-3 flex items-center justify-between">
            <div class="flex gap-1.5">
                <div class="w-2.5 h-2.5 rounded-full bg-red-500/50"></div>
                <div class="w-2.5 h-2.5 rounded-full bg-yellow-500/50"></div>
                <div class="w-2.5 h-2.5 rounded-full bg-green-500/50"></div>
            </div>
            <span class="text-[0.6rem] tracking-widest uppercase font-bold opacity-50">Auth_Required.sh</span>
        </div>

        <div class="p-10">
            <div class="text-center mb-10">
                <i class="fas fa-microchip text-5xl mb-4 glow-text animate-pulse"></i>
                <h1 class="text-2xl font-bold tracking-tighter glow-text uppercase">Blue Whirl</h1>
                <p class="text-[0.7rem] opacity-60 tracking-widest mt-1">SECURE ACCESS PROTOCOL</p>
            </div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-[0.65rem] uppercase tracking-widest mb-2 opacity-70">Access Key</label>
                    <div class="relative">
                        <input type="password" id="access-key"
                            class="w-full px-4 py-3 pr-12 rounded bg-slate-900 border border-sky-900/50 text-sky-400 focus:outline-none"
                            placeholder="••••••••" required>
                        <button type="button" id="toggle-access-key" aria-label="Show password"
                            class="absolute inset-y-0 right-0 px-3 text-sky-400/70 hover:text-sky-300 transition-colors">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div id="error-msg" class="text-red-400 text-[0.7rem] text-center hidden">
                    <i class="fas fa-exclamation-triangle mr-1"></i> Access Denied: Invalid Key
                </div>

                <button type="submit"
                    class="btn-access w-full py-3 rounded text-slate-900 font-black uppercase tracking-widest text-sm">
                    Initialize Session
                </button>
            </form>

            <div class="mt-10 text-center">
                <a href="../index.html"
                    class="text-[0.65rem] uppercase tracking-widest opacity-40 hover:opacity-100 transition-opacity">
                    <i class="fas fa-arrow-left mr-1"></i> Return to Terminal
                </a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const keyInput = document.getElementById('access-key');
        const errorMsg = document.getElementById('error-msg');
        const toggleAccessKeyBtn = document.getElementById('toggle-access-key');

        // Simple static key for demonstration (to be updated by user or obfuscated)
        // Hardcoded key: "83493576"
        const VALID_KEY_HASH = "caba2520b60257cd963832274af0665b21c458d25279cca6153e3ce72344d5b6"; // SHA-256 for "BW-8349"

        async function hashKey(string) {
            const utf8 = new TextEncoder().encode(string);
            const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        toggleAccessKeyBtn?.addEventListener('click', () => {
            const isPassword = keyInput.type === 'password';
            keyInput.type = isPassword ? 'text' : 'password';
            toggleAccessKeyBtn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
            const icon = toggleAccessKeyBtn.querySelector('i');
            icon?.classList.toggle('fa-eye', !isPassword);
            icon?.classList.toggle('fa-eye-slash', isPassword);
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const hashed = await hashKey(keyInput.value);

            if (hashed === VALID_KEY_HASH) {
                // Grant access
                sessionStorage.setItem('bw_admin_session', 'authenticated_' + Date.now());
                window.location.href = 'dashboard.html';
            } else {
                errorMsg.classList.remove('hidden');
                keyInput.parentElement.classList.add('animate-shake');
                setTimeout(() => {
                    keyInput.parentElement.classList.remove('animate-shake');
                }, 500);
            }
        });
    </script>
</body>

</html>
